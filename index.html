<!doctype html>
<html lang="tr" class="theme-light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="icon-512.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Outfit fontu boot.js içinde opsiyonel/asenkron yüklenir; yüklenemezse
         sistem fontuna düşülür ve boot HATASI verilmez. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://*.supabase.co https://googleads.g.doubleclick.net https://pagead2.googlesyndication.com; frame-src https://googleads.g.doubleclick.net;"
    />
    <meta name="theme-color" content="#edf1f7" />
    <meta name="description" content="İş İmparatorluğu — işletme kur, birleş, borsaya çık!" />
    <title>İş İmparatorluğu</title>
    <style>
      html, body { margin: 0; min-height: 100%; background: #edf1f7; color: #1a2030; }
      #app:empty { min-height: 100vh; min-height: 100dvh; display: flex; align-items: center; justify-content: center; }
      #app:empty::after { content: 'Yükleniyor…'; font-family: system-ui, sans-serif; color: #c97f00; font-weight: 700; }
      #boot-error { display: none; padding: 24px; max-width: 420px; margin: 0 auto; font-family: system-ui, sans-serif; color: #fecaca; text-align: center; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="boot-error"></div>
    <script src="./boot.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
